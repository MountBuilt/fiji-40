<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiji Fabulous 40 Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ocean:      #1a6b8a;
      --ocean-dark: #0d4f6e;
      --sand:       #f5ede0;
      --palm:       #2d7d4f;
      --palm-light: #e6f4ec;
      --coral:      #e05c3a;
      --coral-light:#fff0eb;
      --sky:        #e8f4f8;
      --sky-dark:   #d0e8f0;
      --dusk:       #5c3d6e;
      --dusk-light: #f0eaf6;
      --gold:       #c8860a;
      --gold-light: #fdf3e0;
      --white:      #ffffff;
      --text:       #1a1a1a;
      --muted:      #6b7280;
      --border:     #e5e7eb;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; }

    /* ── WELCOME ── */
    #welcome-screen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(160deg, #0d4f6e 0%, #1a6b8a 40%, #2d7d4f 100%);
      padding: 2rem; position: relative; overflow: hidden;
    }
    #welcome-screen::before {
      content: ''; position: absolute; width: 600px; height: 600px;
      border: 1px solid rgba(255,255,255,0.07); border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      animation: ripple 6s ease-in-out infinite;
    }
    #welcome-screen::after {
      content: ''; position: absolute; width: 900px; height: 900px;
      border: 1px solid rgba(255,255,255,0.04); border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      animation: ripple 6s ease-in-out infinite 1.5s;
    }
    @keyframes ripple {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1; }
      50%      { transform: translate(-50%,-50%) scale(1.05); opacity:0.4; }
    }
    .welcome-card {
      background: rgba(255,255,255,0.11); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18); border-radius: 1.5rem;
      padding: 2.5rem 2rem; max-width: 420px; width: 100%;
      text-align: center; position: relative; z-index: 1;
    }
    .welcome-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(1.6rem,5vw,2.1rem); color: #fff; line-height: 1.2; margin-bottom: 0.4rem; }
    .welcome-subtitle { font-size: 0.82rem; color: rgba(255,255,255,0.65); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2rem; }
    .welcome-label { display: block; text-align: left; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 0.45rem; }
    .welcome-select {
      width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.28); background: rgba(255,255,255,0.14);
      color: #fff; font-size: 1rem; font-family: 'Inter',sans-serif;
      appearance: none; cursor: pointer; margin-bottom: 1.25rem; outline: none;
      transition: background 0.2s, border 0.2s;
    }
    .welcome-select:focus { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }
    .welcome-select option { background: #1a6b8a; color: white; }
    .welcome-btn {
      width: 100%; padding: 0.85rem; border-radius: 0.75rem; background: var(--coral);
      color: white; font-size: 1rem; font-weight: 600; border: none; cursor: pointer;
      transition: transform 0.15s, background 0.2s; letter-spacing: 0.02em;
    }
    .welcome-btn:hover  { background: #c94e2e; transform: translateY(-1px); }
    .welcome-btn:active { transform: translateY(0); }

    /* ── APP HEADER ── */
    #app { display: none; }
    .app-header {
      background: linear-gradient(135deg, #0d4f6e 0%, #1a6b8a 100%);
      color: white; padding: 1rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .app-header-title { font-family: 'Playfair Display',serif; font-size: clamp(1rem,3vw,1.3rem); font-weight: 700; line-height: 1.2; }
    .app-header-subtitle { font-size: 0.7rem; opacity: 0.68; letter-spacing: 0.05em; text-transform: uppercase; }
    .family-badge {
      background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.24);
      border-radius: 2rem; padding: 0.35rem 0.85rem; font-size: 0.78rem; font-weight: 600;
      white-space: nowrap; cursor: pointer; transition: background 0.2s;
    }
    .family-badge:hover { background: rgba(255,255,255,0.24); }

    /* ── DAY CARD ── */
    .day-section {
      margin: 1.25rem 0.75rem; border-radius: 1rem;
      overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.08); background: white;
    }
    .day-header {
      background: linear-gradient(90deg, var(--ocean-dark) 0%, var(--ocean) 100%);
      color: white; padding: 0.85rem 1.25rem;
      display: flex; align-items: baseline; gap: 0.6rem;
    }
    .day-name { font-family: 'Playfair Display',serif; font-size: 1.15rem; font-weight: 700; }
    .day-date { font-size: 0.75rem; opacity: 0.68; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── SLOT ROW ── */
    .slot-section { border-top: 1px solid var(--border); }
    .slot-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1.25rem 0.4rem;
    }
    .slot-header-left { display: flex; align-items: center; gap: 0.45rem; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .slot-emoji { font-size: 0.95rem; }
    .add-card-btn-inline {
      font-size: 0.7rem; font-weight: 600; color: var(--ocean); background: var(--sky);
      border: none; border-radius: 1rem; padding: 0.2rem 0.65rem; cursor: pointer;
      transition: background 0.15s, color 0.15s; white-space: nowrap;
    }
    .add-card-btn-inline:hover { background: var(--sky-dark); }

    /* Cards row */
    .slot-cards-row {
      display: flex; flex-direction: row; gap: 0.75rem;
      overflow-x: auto; padding: 0 1.25rem 1rem;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .slot-cards-row::-webkit-scrollbar { display: none; }

    /* ── CARD BASE ── */
    .activity-card {
      flex-shrink: 0; width: 210px; border-radius: 0.875rem;
      border: 1.5px solid var(--border); padding: 0.85rem;
      display: flex; flex-direction: column; gap: 0.45rem;
      position: relative; transition: box-shadow 0.2s;
      background: white;
    }
    .activity-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    /* Card type colours */
    .card-type-activity { background: var(--sky);        border-color: #b8d8e8; }
    .card-type-dinner   { background: var(--dusk-light); border-color: #c9b4dc; }
    .card-type-free     { background: #f8f8f8;           border-color: #e0e0e0; }
    .card-type-boat     { background: var(--gold-light);  border-color: #e0b86a; }

    /* Needs booking highlight overrides border colour */
    .needs-booking { border-color: var(--coral) !important; }

    /* Type pill at top of card */
    .card-type-pill {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      border-radius: 2rem; padding: 0.1rem 0.5rem; align-self: flex-start; margin-bottom: 0.1rem;
    }
    .pill-activity { background: #c5e4f0; color: var(--ocean-dark); }
    .pill-dinner   { background: #d9c8ec; color: var(--dusk); }
    .pill-free     { background: #e5e5e5; color: #555; }
    .pill-boat     { background: #fce0a0; color: var(--gold); }
    .pill-permanent{ background: #c4e8d0; color: var(--palm); }

    /* Card top row */
    .card-top-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.25rem; }
    .card-name {
      font-weight: 600; font-size: 0.875rem; line-height: 1.3;
      color: #1a1a1a; min-height: 1.2em; word-break: break-word;
      outline: none; border-radius: 0.25rem; padding: 0.1rem 0;
    }
    .card-name[contenteditable="true"]:hover { background: rgba(255,255,255,0.6); padding: 0.1rem 0.2rem; }
    .card-name[contenteditable="true"]:focus { background: rgba(255,255,255,0.9); padding: 0.1rem 0.2rem; }
    .card-name:empty:before { content: attr(data-placeholder); color: #aaa; font-weight: 400; }
    .card-delete-btn { background: none; border: none; color: #d1d5db; font-size: 1rem; cursor: pointer; padding: 0; line-height: 1; transition: color 0.15s; flex-shrink: 0; }
    .card-delete-btn:hover { color: var(--coral); }
    .card-notes {
      font-size: 0.74rem; color: #4b5563; line-height: 1.5;
      min-height: 1em; word-break: break-word; white-space: pre-wrap;
      outline: none; border-radius: 0.25rem; padding: 0.1rem 0;
    }
    .card-notes[contenteditable="true"]:hover { background: rgba(255,255,255,0.6); padding: 0.1rem 0.2rem; }
    .card-notes[contenteditable="true"]:focus { background: rgba(255,255,255,0.9); padding: 0.1rem 0.2rem; color: #1a1a1a; }
    .card-notes:empty:before { content: attr(data-placeholder); color: #aaa; }

    /* Link row */
    .card-link-row { display: flex; align-items: center; gap: 0.3rem; }
    .card-link-input { font-size: 0.68rem; color: var(--ocean); background: transparent; border: none; outline: none; flex: 1; font-family: 'Inter',sans-serif; min-width: 0; }
    .card-link-input::placeholder { color: #c0c9d0; }
    .card-link-open { font-size: 0.68rem; color: var(--ocean); text-decoration: none; flex-shrink: 0; opacity: 0.7; }
    .card-link-open:hover { opacity: 1; text-decoration: underline; }

    /* Booking toggle */
    .card-booking-row { display: flex; align-items: center; gap: 0.4rem; }
    .booking-toggle {
      appearance: none; width: 13px; height: 13px; border-radius: 3px;
      border: 1.5px solid #d1d5db; background: white; cursor: pointer; flex-shrink: 0;
      position: relative; transition: background 0.15s, border-color 0.15s;
    }
    .booking-toggle:checked { background: var(--coral); border-color: var(--coral); }
    .booking-toggle:checked::after { content:'✓'; position:absolute; top:-1px; left:1px; font-size:9px; color:white; font-weight:700; }
    .booking-label { font-size: 0.68rem; color: var(--muted); }
    .booking-label.required { color: var(--coral); font-weight: 600; }

    /* Divider */
    .card-divider { height: 1px; background: rgba(0,0,0,0.06); margin: 0.1rem 0; }

    /* Attendee checkboxes */
    .card-attendees { display: flex; flex-direction: column; gap: 0.28rem; }
    .attendee-row { display: flex; align-items: center; gap: 0.4rem; }
    .attendee-check {
      appearance: none; width: 13px; height: 13px; border-radius: 3px;
      border: 1.5px solid #b0c8d4; background: white; cursor: pointer; flex-shrink: 0;
      position: relative; transition: background 0.15s, border-color 0.15s;
    }
    .attendee-check:checked { background: var(--palm); border-color: var(--palm); }
    .attendee-check:checked::after { content:'✓'; position:absolute; top:-1px; left:1px; font-size:9px; color:white; font-weight:700; }
    .attendee-name { font-size: 0.71rem; color: var(--text); flex: 1; }
    .attendee-name.is-parent { font-weight: 600; }

    /* Total badge */
    .card-total-badge { font-size: 0.66rem; font-weight: 600; color: var(--palm); background: var(--palm-light); border-radius: 2rem; padding: 0.15rem 0.5rem; align-self: flex-start; margin-top: 0.1rem; }
    .card-total-badge.zero { color: #9ca3af; background: #f3f4f6; }

    /* Boat cap badge */
    .boat-cap-badge { font-size: 0.66rem; font-weight: 600; border-radius: 2rem; padding: 0.15rem 0.5rem; align-self: flex-start; }
    .boat-cap-ok   { color: var(--gold);  background: var(--gold-light); }
    .boat-cap-full { color: var(--coral); background: var(--coral-light); }

    /* Attendee accordion */
    .attendee-toggle {
      display: flex; align-items: center; gap: 0.35rem; cursor: pointer;
      font-size: 0.68rem; font-weight: 600; color: var(--palm);
      background: var(--palm-light); border: none; border-radius: 2rem;
      padding: 0.18rem 0.55rem; margin-top: 0.1rem; align-self: flex-start;
      transition: background 0.15s;
    }
    .attendee-toggle:hover { background: #cdeedd; }
    .attendee-toggle .toggle-arrow { font-size: 0.55rem; transition: transform 0.2s; }
    .attendee-toggle.open .toggle-arrow { transform: rotate(180deg); }
    .attendee-names-list {
      display: none; flex-direction: column; gap: 0.15rem;
      margin-top: 0.25rem; padding: 0.35rem 0.5rem;
      background: rgba(255,255,255,0.6); border-radius: 0.5rem;
      font-size: 0.7rem;
    }
    .attendee-names-list.open { display: flex; }
    .attendee-name-chip {
      color: #374151; line-height: 1.4;
    }
    .attendee-name-chip.is-parent { font-weight: 600; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 0.35rem; animation: pulse-green 2s ease-in-out infinite; }
    @keyframes pulse-green { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .sync-dot.offline { background: #f87171; animation: none; }

    /* Toast */
    #toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(4rem); background:#1a1a1a; color:white; padding:0.6rem 1.2rem; border-radius:2rem; font-size:0.82rem; font-weight:500; z-index:200; transition:transform 0.3s ease; pointer-events:none; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) translateY(0); }

    /* Loading */
    #loading-overlay { position:fixed; inset:0; background:linear-gradient(160deg,#0d4f6e 0%,#1a6b8a 40%,#2d7d4f 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; color:white; gap:1rem; transition:opacity 0.4s ease; }
    #loading-overlay.fade-out { opacity:0; pointer-events:none; }
    .loading-spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.2); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:480px) {
      .day-section { margin-left:0.5rem; margin-right:0.5rem; }
      .activity-card { width:190px; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay">
  <div style="font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;">🌴 Fiji Fabulous 40</div>
  <div class="loading-spinner"></div>
  <div style="font-size:0.9rem;opacity:0.75;">Loading planner…</div>
</div>

<!-- WELCOME -->
<div id="welcome-screen" style="display:none;">
  <div class="welcome-card">
    <div style="font-size:2.4rem;margin-bottom:0.6rem;">🌴</div>
    <div class="welcome-title">Fiji Fabulous 40<br>Planner</div>
    <div class="welcome-subtitle">June 21–27 &nbsp;·&nbsp; Shangri-La Yanuca Island</div>
    <label class="welcome-label" for="family-select">Who are you?</label>
    <select class="welcome-select" id="family-select">
      <option value="" disabled selected>Select your family…</option>
      <option value="dana-simon">Dana &amp; Simon (Heidi, Alfred)</option>
      <option value="carly-tim">Carly &amp; Tim (Addy, Teddy, Elsie)</option>
      <option value="carly-matt">Carly &amp; Matt (Isla, Noah)</option>
      <option value="jenny-lucas">Jenny &amp; Lucas (Neve, Remy, Bede)</option>
      <option value="nat">Nat</option>
      <option value="prue-clint">Prue &amp; Clint (Pip, Annabelle, Henry)</option>
    </select>
    <button class="welcome-btn" onclick="enterApp()">Let's plan! 🎉</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="app-header">
    <div>
      <div class="app-header-title">🌴 Fiji Fabulous 40</div>
      <div class="app-header-subtitle">June 21–27 · Shangri-La Yanuca Island</div>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <div style="font-size:0.7rem;color:rgba(255,255,255,0.65);">
        <span class="sync-dot" id="sync-dot"></span><span id="sync-label">Live</span>
      </div>
      <div class="family-badge" id="family-badge" onclick="switchFamily()" title="Switch family">
        👨‍👩‍👧‍👦 <span id="family-name-header"></span>
      </div>
    </div>
  </header>

  <!-- Legend -->
  <div style="display:flex;gap:0.5rem;flex-wrap:wrap;padding:0.75rem 1.25rem 0;align-items:center;">
    <span style="font-size:0.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-right:0.25rem;">Key:</span>
    <span style="font-size:0.68rem;background:var(--sky);border:1.5px solid #b8d8e8;border-radius:0.4rem;padding:0.15rem 0.55rem;color:var(--ocean-dark);font-weight:600;">🏄 Activity</span>
    <span style="font-size:0.68rem;background:var(--dusk-light);border:1.5px solid #c9b4dc;border-radius:0.4rem;padding:0.15rem 0.55rem;color:var(--dusk);font-weight:600;">🍽 Dinner</span>
    <span style="font-size:0.68rem;background:var(--gold-light);border:1.5px solid #e0b86a;border-radius:0.4rem;padding:0.15rem 0.55rem;color:var(--gold);font-weight:600;">⛵ Boat Charter</span>
    <span style="font-size:0.68rem;background:#f8f8f8;border:1.5px solid #e0e0e0;border-radius:0.4rem;padding:0.15rem 0.55rem;color:#555;font-weight:600;">🌊 Free Time</span>
    <span style="font-size:0.68rem;background:var(--coral-light);border:1.5px solid var(--coral);border-radius:0.4rem;padding:0.15rem 0.55rem;color:var(--coral);font-weight:600;">📋 Needs Booking</span>
  </div>

  <div id="days-container" style="padding-bottom:2rem;"></div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove }
                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCq7TFqj_Tdod_JJZrbxYY7cu2gEbpJlcg",
  authDomain:        "fiji-40.firebaseapp.com",
  databaseURL:       "https://fiji-40-default-rtdb.firebaseio.com",
  projectId:         "fiji-40",
  storageBucket:     "fiji-40.firebasestorage.app",
  messagingSenderId: "742380008841",
  appId:             "1:742380008841:web:6c4ba42bfbdac4d90e9d58"
};

const firebaseApp = initializeApp(firebaseConfig);
const db          = getDatabase(firebaseApp);

// ─────────────────────────────────────────────
// FAMILIES
// ─────────────────────────────────────────────
const FAMILIES = {
  "dana-simon":  { label:"Dana & Simon",  parents:["Dana","Simon"],   kids:["Heidi","Alfred"] },
  "carly-tim":   { label:"Carly & Tim",   parents:["Carly","Tim"],    kids:["Addy","Teddy","Elsie"] },
  "carly-matt":  { label:"Carly & Matt",  parents:["Carly","Matt"],   kids:["Isla","Noah"] },
  "jenny-lucas": { label:"Jenny & Lucas", parents:["Jenny","Lucas"],  kids:["Neve","Remy","Bede"] },
  "nat":         { label:"Nat",           parents:["Nat"],            kids:[] },
  "prue-clint":  { label:"Prue & Clint",  parents:["Prue","Clint"],   kids:["Pip","Annabelle","Henry"] },
};

// ─────────────────────────────────────────────
// DAYS & SLOTS
// ─────────────────────────────────────────────
const DAYS = [
  { id:"jun21", label:"Sunday",    date:"21 June"  },
  { id:"jun22", label:"Monday",    date:"22 June"  },
  { id:"jun23", label:"Tuesday",   date:"23 June"  },
  { id:"jun24", label:"Wednesday", date:"24 June"  },
  { id:"jun25", label:"Thursday",  date:"25 June"  },
  { id:"jun26", label:"Friday",    date:"26 June"  },
  { id:"jun27", label:"Saturday",  date:"27 June"  },
];

const SLOTS = [
  { id:"morning",   label:"Morning",   emoji:"🌅" },
  { id:"afternoon", label:"Afternoon", emoji:"☀️" },
  { id:"evening",   label:"Evening",   emoji:"🌙" },
];

// Slot hint text shown in the header
const SLOT_HINTS = {
  morning:   "activities & plans",
  afternoon: "activities & plans",
  evening:   "dinner & evening plans",
};

// Card types
const TYPE = { ACTIVITY:"activity", DINNER:"dinner", BOAT:"boat", FREE:"free" };

// Permanent cards per slot (never deletable, always shown)
// "own-thing" shown in all slots; "kids-club" added dynamically per slot
const PERM_OWN_THING = {
  id:"own-thing", name:"Own Thing / Free Time",
  notes:"Doing your own thing — add a note to propose something 🏖️",
  isPermanent:true, type:TYPE.FREE,
};
const PERM_KIDS_CLUB = {
  id:"kids-club", name:"Kids Club — Little Chiefs",
  notes:"Resort-supervised kids activities all day",
  isPermanent:true, type:TYPE.ACTIVITY,
};

// ─────────────────────────────────────────────
// SEED DATA
// Full 7-day itinerary — written to Firebase once on first load.
// Types: activity | dinner | boat | free
// needsBooking: true = Simon needs to book, others need to RSVP
// boatCap: integer = max RSVP count for boat charters
// ─────────────────────────────────────────────
const SEED = {
  // Sunday 21 June — Arrival day

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentFamily = null;
let plannerData   = {};
let dbListener    = null;

function uid() { return Math.random().toString(36).slice(2,9); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─────────────────────────────────────────────
// WELCOME / FAMILY SELECTION
// ─────────────────────────────────────────────
window.enterApp = function() {
  const sel = document.getElementById('family-select').value;
  if (!sel) { showToast('Please select your family first.'); return; }
  currentFamily = sel;
  localStorage.setItem('fijiFamily', sel);
  showApp();
};

window.switchFamily = function() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('welcome-screen').style.display = 'flex';
  document.getElementById('family-select').value = currentFamily || '';
};

function showApp() {
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('family-name-header').textContent = FAMILIES[currentFamily].label;
  attachFirebaseListener();
}

// ─────────────────────────────────────────────
// FIREBASE
// ─────────────────────────────────────────────
function attachFirebaseListener() {
  const plannerRef = ref(db, 'fijiPlanner');
  if (dbListener) dbListener();
  // We use a version flag so that if the DB has old/blank data from a
  // previous build, we wipe and reseed automatically.
  const CURRENT_VERSION = 4;

  dbListener = onValue(plannerRef, (snapshot) => {
    setSyncStatus(true);
    const data = snapshot.val();
    const version = data?._version || 0;
    if (!data || version < CURRENT_VERSION) {
      seedDatabase(CURRENT_VERSION);
    } else {
      plannerData = data;
      renderPlanner();
    }
  }, () => setSyncStatus(false));
}

function setSyncStatus(online) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.classList.toggle('offline', !online);
  lbl.textContent = online ? 'Live' : 'Offline';
}

async function seedDatabase(version) {
  const writes = { _version: version };
  for (const day of DAYS) {
    writes[day.id] = {};
    for (const slot of SLOTS) {
      writes[day.id][slot.id] = { activities: {} };
      const seeds = SEED[day.id]?.[slot.id] || [];
      for (const s of seeds) {
        const id = uid();
        writes[day.id][slot.id].activities[id] = {
          id, name:s.name, notes:s.notes||'', link:s.link||'',
          needsBooking:s.needsBooking||false, type:s.type||TYPE.ACTIVITY,
          attendance:{}, isPermanent:false,
          ...(s.boatCap ? { boatCap:s.boatCap } : {}),
        };
      }
    }
  }
  await set(ref(db, 'fijiPlanner'), writes);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderPlanner() {
  const container = document.getElementById('days-container');
  const scrollY   = window.scrollY;
  container.innerHTML = '';

  for (const day of DAYS) {
    const dayEl = document.createElement('div');
    dayEl.className = 'day-section';
    dayEl.innerHTML = `<div class="day-header"><span class="day-name">${day.label}</span><span class="day-date">${day.date}</span></div>`;

    for (const slot of SLOTS) {
      const slotEl  = document.createElement('div');
      slotEl.className = 'slot-section';

      // Slot header with add button
      const hdr = document.createElement('div');
      hdr.className = 'slot-header';
      hdr.innerHTML = `
        <div class="slot-header-left">
          <span class="slot-emoji">${slot.emoji}</span>
          <span>${slot.label}</span>
          <span style="font-weight:400;opacity:0.7;">— ${SLOT_HINTS[slot.id]}</span>
        </div>
        <div style="display:flex;gap:0.4rem;">
          ${slot.id !== 'evening' ? `<button class="add-card-btn-inline" onclick="addCard('${day.id}','${slot.id}','${TYPE.ACTIVITY}')">＋ Activity</button>` : ''}
          ${slot.id === 'evening' ? `<button class="add-card-btn-inline" onclick="addCard('${day.id}','${slot.id}','${TYPE.DINNER}')">＋ Dinner</button>` : ''}
        </div>`;
      slotEl.appendChild(hdr);

      const row = document.createElement('div');
      row.className = 'slot-cards-row';

      // Regular activities from Firebase
      const acts = plannerData[day.id]?.[slot.id]?.activities || {};
      for (const [actId, act] of Object.entries(acts)) {
        row.appendChild(buildCard(day.id, slot.id, actId, act, false));
      }

      // Permanent cards
      // Own Thing in all slots
      row.appendChild(buildCard(day.id, slot.id, PERM_OWN_THING.id, {
        ...PERM_OWN_THING,
        attendance: plannerData[day.id]?.[slot.id]?.permanent?.[PERM_OWN_THING.id]?.attendance || {},
        notes: plannerData[day.id]?.[slot.id]?.permanent?.[PERM_OWN_THING.id]?.notes || PERM_OWN_THING.notes,
      }, true));

      // Kids Club: always in evening; also pre-filled on Wednesday evening
      const isWedEvening = (day.id === 'jun25' && slot.id === 'evening');
      if (slot.id === 'evening' || isWedEvening) {
        row.appendChild(buildCard(day.id, slot.id, PERM_KIDS_CLUB.id, {
          ...PERM_KIDS_CLUB,
          attendance: plannerData[day.id]?.[slot.id]?.permanent?.[PERM_KIDS_CLUB.id]?.attendance || {},
        }, true));
      }

      slotEl.appendChild(row);
      dayEl.appendChild(slotEl);
    }

    container.appendChild(dayEl);
  }

  window.scrollTo(0, scrollY);
}

// ─────────────────────────────────────────────
// BUILD CARD
// ─────────────────────────────────────────────
function buildCard(dayId, slotId, actId, act, isPermanent) {
  const fam     = FAMILIES[currentFamily];
  const cardType = act.type || TYPE.ACTIVITY;

  const card = document.createElement('div');
  card.className = `activity-card card-type-${isPermanent ? (cardType === TYPE.FREE ? 'free' : cardType === TYPE.DINNER ? 'dinner' : 'activity') : cardType}`;
  if (act.needsBooking) card.classList.add('needs-booking');

  // ── Type pill ──
  const pill = document.createElement('span');
  pill.className = 'card-type-pill';
  if (isPermanent) {
    pill.className += ' pill-permanent';
    pill.textContent = cardType === TYPE.FREE ? '🌊 Free Time' : '👶 Always On';
  } else {
    const pillMap = {
      [TYPE.ACTIVITY]: { cls:'pill-activity', label:'🏄 Activity' },
      [TYPE.DINNER]:   { cls:'pill-dinner',   label:'🍽 Dinner'   },
      [TYPE.BOAT]:     { cls:'pill-boat',      label:'⛵ Boat Charter' },
      [TYPE.FREE]:     { cls:'pill-free',      label:'🌊 Free Time' },
    };
    const p = pillMap[cardType] || pillMap[TYPE.ACTIVITY];
    pill.className += ` ${p.cls}`;
    pill.textContent = p.label;
  }
  card.appendChild(pill);

  // ── Name + delete ──
  const topRow = document.createElement('div');
  topRow.className = 'card-top-row';

  const nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = act.name || '';
  if (!isPermanent) {
    nameEl.contentEditable = 'true';
    nameEl.setAttribute('data-placeholder', 'Activity name');
    nameEl.addEventListener('blur', () => updateField(dayId, slotId, actId, 'name', nameEl.textContent.trim()));
  }
  topRow.appendChild(nameEl);

  if (!isPermanent) {
    const del = document.createElement('button');
    del.className = 'card-delete-btn';
    del.innerHTML = '✕';
    del.title     = 'Delete';
    del.onclick   = () => deleteCard(dayId, slotId, actId, act.name);
    topRow.appendChild(del);
  }
  card.appendChild(topRow);

  // ── Notes ──
  const notesEl = document.createElement('div');
  notesEl.className = 'card-notes';
  notesEl.textContent = act.notes || '';

  if (isPermanent && actId === PERM_OWN_THING.id) {
    notesEl.contentEditable = 'true';
    notesEl.setAttribute('data-placeholder', 'Add a note or propose something…');
    notesEl.addEventListener('blur', () => {
      set(ref(db, `fijiPlanner/${dayId}/${slotId}/permanent/${actId}/notes`), notesEl.textContent.trim());
    });
  } else if (!isPermanent) {
    notesEl.contentEditable = 'true';
    notesEl.setAttribute('data-placeholder', 'Notes, details, pricing…');
    notesEl.addEventListener('blur', () => updateField(dayId, slotId, actId, 'notes', notesEl.textContent.trim()));
  }
  card.appendChild(notesEl);

  // ── Link (non-permanent only) ──
  if (!isPermanent) {
    const linkRow = document.createElement('div');
    linkRow.className = 'card-link-row';
    const linkIn = document.createElement('input');
    linkIn.className   = 'card-link-input';
    linkIn.type        = 'url';
    linkIn.placeholder = 'Add link…';
    linkIn.value       = act.link || '';
    linkIn.addEventListener('change', () => updateField(dayId, slotId, actId, 'link', linkIn.value));
    linkRow.appendChild(linkIn);
    if (act.link) {
      const a = document.createElement('a');
      a.className = 'card-link-open';
      a.href = act.link; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.textContent = '↗';
      linkRow.appendChild(a);
    }
    card.appendChild(linkRow);
  }

  // ── Booking toggle (non-permanent only) ──
  if (!isPermanent) {
    const bRow = document.createElement('div');
    bRow.className = 'card-booking-row';
    const bChk = document.createElement('input');
    bChk.type = 'checkbox'; bChk.className = 'booking-toggle'; bChk.checked = !!act.needsBooking;
    const bLbl = document.createElement('label');
    bLbl.className = `booking-label${act.needsBooking ? ' required' : ''}`;
    bLbl.textContent = act.needsBooking ? '📋 Simon is booking — RSVP below' : 'Needs booking?';
    bChk.addEventListener('change', () => {
      updateField(dayId, slotId, actId, 'needsBooking', bChk.checked);
      card.classList.toggle('needs-booking', bChk.checked);
      bLbl.className = `booking-label${bChk.checked ? ' required' : ''}`;
      bLbl.textContent = bChk.checked ? '📋 Simon is booking — RSVP below' : 'Needs booking?';
    });
    bRow.appendChild(bChk); bRow.appendChild(bLbl);
    card.appendChild(bRow);
  }

  // ── Divider ──
  const div = document.createElement('div');
  div.className = 'card-divider';
  card.appendChild(div);

  // ── Attendee checkboxes ──
  const attendeesEl = document.createElement('div');
  attendeesEl.className = 'card-attendees';

  const members  = [...fam.parents, ...fam.kids];
  const isBoat   = cardType === TYPE.BOAT && !isPermanent;
  const boatCap  = act.boatCap || 16;
  const totalCount = countAttendance(act.attendance);

  for (const member of members) {
    const key       = `${currentFamily}__${member}`;
    const isChecked = !!(act.attendance && act.attendance[key]);
    const isParent  = fam.parents.includes(member);
    const atCap     = isBoat && totalCount >= boatCap && !isChecked;

    const row = document.createElement('div');
    row.className = 'attendee-row';

    const chk = document.createElement('input');
    chk.type      = 'checkbox';
    chk.className = 'attendee-check';
    chk.checked   = isChecked;
    chk.disabled  = atCap;
    if (atCap) chk.title = 'Boat is full (16 people)';

    const path = isPermanent
      ? `fijiPlanner/${dayId}/${slotId}/permanent/${actId}/attendance/${key}`
      : `fijiPlanner/${dayId}/${slotId}/activities/${actId}/attendance/${key}`;

    chk.addEventListener('change', () => {
      set(ref(db, path), chk.checked ? true : null);
    });

    const nm = document.createElement('span');
    nm.className = `attendee-name${isParent ? ' is-parent' : ''}`;
    nm.textContent = member;

    row.appendChild(chk); row.appendChild(nm);
    attendeesEl.appendChild(row);
  }
  card.appendChild(attendeesEl);

  // ── Total / boat cap badge + accordion of who's going ──
  // Build the list of all checked-in people across all families
  const goingNames = buildGoingNames(act.attendance);

  if (isBoat) {
    const full = totalCount >= boatCap;
    const capBadge = document.createElement('div');
    capBadge.className = `boat-cap-badge ${full ? 'boat-cap-full' : 'boat-cap-ok'}`;
    capBadge.textContent = full
      ? `⛵ FULL — ${totalCount}/${boatCap} spots`
      : `⛵ ${totalCount}/${boatCap} spots taken`;
    card.appendChild(capBadge);
  }

  if (totalCount > 0) {
    const toggle = document.createElement('button');
    toggle.className = 'attendee-toggle';
    toggle.innerHTML = `${totalCount} going <span class="toggle-arrow">▼</span>`;

    const namesList = document.createElement('div');
    namesList.className = 'attendee-names-list';
    goingNames.forEach(({ name, isParent }) => {
      const chip = document.createElement('div');
      chip.className = `attendee-name-chip${isParent ? ' is-parent' : ''}`;
      chip.textContent = name;
      namesList.appendChild(chip);
    });

    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      namesList.classList.toggle('open');
    });

    card.appendChild(toggle);
    card.appendChild(namesList);
  } else if (!isBoat) {
    const zeroBadge = document.createElement('div');
    zeroBadge.className = 'card-total-badge zero';
    zeroBadge.textContent = 'No one yet';
    card.appendChild(zeroBadge);
  }

  return card;
}

function countAttendance(attendance) {
  if (!attendance) return 0;
  return Object.values(attendance).filter(Boolean).length;
}

// Build a sorted list of names who are going, across all families
function buildGoingNames(attendance) {
  if (!attendance) return [];
  const result = [];
  for (const [key, val] of Object.entries(attendance)) {
    if (!val) continue;
    const [famId, memberName] = key.split('__');
    const fam = FAMILIES[famId];
    if (!fam) continue;
    const isParent = fam.parents.includes(memberName);
    result.push({ name: memberName, isParent, famLabel: fam.label });
  }
  // Sort: parents first, then kids, alphabetical within each
  result.sort((a, b) => {
    if (a.isParent && !b.isParent) return -1;
    if (!a.isParent && b.isParent) return 1;
    return a.name.localeCompare(b.name);
  });
  return result;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// ─────────────────────────────────────────────
// FIREBASE WRITE HELPERS
// ─────────────────────────────────────────────
function updateField(dayId, slotId, actId, field, value) {
  set(ref(db, `fijiPlanner/${dayId}/${slotId}/activities/${actId}/${field}`), value);
}

window.addCard = function(dayId, slotId, type) {
  const id = uid();
  const defaults = {
    [TYPE.ACTIVITY]: { name:'New Activity',      notes:'' },
    [TYPE.DINNER]:   { name:'Dinner Suggestion',  notes:'Propose a dinner option…' },
    [TYPE.BOAT]:     { name:'Boat Charter',       notes:'', boatCap:16 },
    [TYPE.FREE]:     { name:'Own Thing',          notes:'' },
  };
  const d = defaults[type] || defaults[TYPE.ACTIVITY];
  set(ref(db, `fijiPlanner/${dayId}/${slotId}/activities/${id}`), {
    id, name:d.name, notes:d.notes, link:'', needsBooking:false,
    type, attendance:{}, isPermanent:false,
    ...(d.boatCap ? { boatCap:d.boatCap } : {}),
  });
  showToast('Card added ✓');
};

function deleteCard(dayId, slotId, actId, name) {
  if (!confirm(`Delete "${name}"?`)) return;
  remove(ref(db, `fijiPlanner/${dayId}/${slotId}/activities/${actId}`));
  showToast('Removed');
}

function init() {
  const overlay = document.getElementById('loading-overlay');
  const saved   = localStorage.getItem('fijiFamily');
  setTimeout(() => {
    overlay.classList.add('fade-out');
    setTimeout(() => overlay.style.display = 'none', 400);
    if (saved && FAMILIES[saved]) {
      currentFamily = saved;
      showApp();
    } else {
      document.getElementById('welcome-screen').style.display = 'flex';
    }
  }, 800);
}

init();
</script>
